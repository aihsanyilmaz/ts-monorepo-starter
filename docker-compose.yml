services:
  honojs:
    build:
      context: .
      dockerfile: apps/honojs/Dockerfile
      target: deps
    command: pnpm --filter @repo/honojs dev
    ports:
      - "3001:3001"
    volumes:
      - ./apps/honojs/src:/app/apps/honojs/src
      - honojs-data:/app/apps/honojs/data
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=./data/dev.db

  nextjs:
    build:
      context: .
      dockerfile: apps/nextjs/Dockerfile
      target: deps
    command: pnpm --filter @repo/nextjs dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/nextjs/src:/app/apps/nextjs/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - honojs

volumes:
  honojs-data:
