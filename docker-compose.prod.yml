services:
  honojs:
    build:
      context: .
      dockerfile: apps/honojs/Dockerfile
      target: production
    ports:
      - "3001:3001"
    volumes:
      - honojs-data:/app/apps/honojs/data
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=./data/prod.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nextjs:
    build:
      context: .
      dockerfile: apps/nextjs/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      honojs:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  honojs-data:
